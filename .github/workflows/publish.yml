name: Release & Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release (bump version, changelog, tag)
        run: npx commit-and-tag-version

      # Authenticates via OIDC trusted publishing (no token). Requires the
      # id-token: write permission above and the trusted publisher configured on
      # npmjs.com for this repo + workflow (publish.yml) + environment (release).
      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Push release commit and tag
        run: git push origin main --follow-tags
